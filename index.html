<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lesson Plan Builder — Ravenscroft Middle School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #00703C; --gold: #FFC702; --green-dark: #005a30;
  --text-primary: #1a1a1a; --text-secondary: #444; --text-tertiary: #888;
  --border: #e2e2e2; --border-hover: #bbb;
  --bg: #f4f5f7; --surface: #ffffff; --surface-2: #f8f9fa;
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
  --amber: #BA7517; --red: #A32D2D; --red-bg: rgba(163,45,45,.07); --red-border: #E24B4A;
  --shadow: 0 2px 12px rgba(0,0,0,.06);
}

[data-theme="dark"] {
  --text-primary: #f0f0f0; --text-secondary: #b0b0b0; --text-tertiary: #6a6a6a;
  --border: #2e2e2e; --border-hover: #444;
  --bg: #111111; --surface: #1a1a1a; --surface-2: #222222;
  --red-bg: rgba(163,45,45,.15); --red-border: #7a2020;
  --shadow: 0 2px 16px rgba(0,0,0,.4);
}

body { font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text-primary); font-size:13px; line-height:1.5; min-height:100vh; padding:24px 16px 48px; transition:background .2s,color .2s; }
.page { max-width:860px; margin:0 auto; background:var(--surface); border-radius:var(--radius-lg); border:1px solid var(--border); padding:24px 28px 28px; box-shadow:var(--shadow); transition:background .2s,border-color .2s; }

/* Header */
.hdr { display:flex; align-items:center; justify-content:space-between; padding-bottom:16px; border-bottom:2px solid var(--green); margin-bottom:16px; }
.hdr-l { display:flex; align-items:center; gap:12px; }
.logo { width:34px; height:34px; border-radius:7px; background:var(--green); display:flex; align-items:center; justify-content:center; color:var(--gold); font-weight:700; font-size:15px; flex-shrink:0; }
.hdr-title { font-size:16px; font-weight:600; color:var(--text-primary); }
.hdr-sub { font-size:12px; color:var(--text-tertiary); margin-top:1px; }
.hdr-r { display:flex; align-items:center; gap:8px; }
.tbadge { display:flex; align-items:center; gap:6px; padding:6px 14px; border-radius:20px; font-size:12.5px; font-weight:500; border:1.5px solid var(--green); color:var(--green); white-space:nowrap; transition:all .2s; }
.tbadge.warn { border-color:var(--amber); color:var(--amber); background:rgba(186,117,23,.06); }
.tbadge.over { border-color:var(--red); color:var(--red); background:var(--red-bg); }
.theme-btn { height:32px; padding:0 10px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-secondary); font-size:15px; transition:all .15s; flex-shrink:0; gap:2px; }
.theme-btn:hover { border-color:var(--border-hover); background:var(--surface-2); }

/* Meta */
.meta-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px; }
.meta-field { display:flex; flex-direction:column; gap:4px; }
.meta-field label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--text-tertiary); }
.mi { font-size:12.5px; padding:6px 10px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface); color:var(--text-primary); font-family:inherit; transition:border-color .15s,background .2s,color .2s; }
.mi:focus { outline:none; border-color:var(--green); box-shadow:0 0 0 3px rgba(0,112,60,.1); }

/* Mode toggle */
.mode-toggle { display:flex; gap:6px; margin-bottom:14px; }
.modebt { padding:6px 14px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface); font-size:12px; font-weight:500; cursor:pointer; color:var(--text-secondary); font-family:inherit; display:flex; align-items:center; gap:5px; transition:all .15s; }
.modebt:hover { border-color:var(--border-hover); background:var(--surface-2); }
.modebt.active { background:var(--green); border-color:var(--green); color:#fff; }

/* Timeline */
.tl-wrap { margin-bottom:14px; }
.tl-bar { display:flex; height:40px; border-radius:var(--radius-md); overflow:hidden; gap:2px; background:var(--surface-2); border:1px solid var(--border); }
.tl-seg { display:flex; align-items:center; justify-content:center; overflow:hidden; min-width:0; }
.tl-seg-label { font-size:9.5px; font-weight:700; color:#fff; text-align:center; line-height:1.25; text-shadow:0 1px 2px rgba(0,0,0,.5); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 3px; pointer-events:none; }
.tl-labels { display:flex; justify-content:space-between; font-size:10px; color:var(--text-tertiary); margin-top:4px; }

/* Alert */
.alert { display:none; align-items:center; gap:8px; padding:8px 12px; border-radius:var(--radius-sm); background:var(--red-bg); border:1px solid var(--red-border); font-size:12px; color:var(--red); margin-bottom:12px; }
.alert.on { display:flex; }

/* App grid */
.app { display:grid; grid-template-columns:210px 1fr; gap:16px; min-height:480px; }
.plabel { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--text-tertiary); margin-bottom:8px; }

/* Palette */
.pal { display:flex; flex-direction:column; gap:4px; overflow-y:auto; max-height:480px; padding-right:4px; }
.pal::-webkit-scrollbar { width:4px; }
.pal::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.psec { font-size:9.5px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--text-tertiary); margin:10px 0 4px; padding-top:8px; border-top:1px solid var(--border); }
.psec:first-child { margin-top:0; border-top:none; padding-top:0; }
.chip { display:flex; align-items:center; gap:8px; padding:7px 9px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface); font-size:11.5px; font-weight:500; user-select:none; transition:border-color .15s,background .15s,box-shadow .15s; }
.chip.dm { cursor:grab; }
.chip.dm:hover { border-color:var(--border-hover); box-shadow:0 1px 4px rgba(0,0,0,.1); }
.chip.dm:active { opacity:.6; cursor:grabbing; }
.chip.cm { cursor:pointer; }
.chip.cm:hover { border-color:var(--green); background:rgba(0,112,60,.06); }
.dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }

/* Sequence */
.seq-wrap { display:flex; flex-direction:column; gap:8px; }
.seq-plabel { display:flex; justify-content:space-between; align-items:center; }
.rn { font-size:11px; color:var(--text-tertiary); }
.rn.tight { color:var(--amber); font-weight:600; }
.rn.none { color:var(--red); font-weight:600; }
.dz { flex:1; min-height:60px; border:1.5px dashed var(--border); border-radius:var(--radius-lg); display:flex; flex-direction:column; transition:border-color .2s,background .2s; padding:8px; }
.dz.hover { border-color:var(--green); background:rgba(0,112,60,.04); }
.seqlist { display:flex; flex-direction:column; gap:6px; }
.hint { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; padding:2rem; text-align:center; }
.hint-main { font-size:13px; color:var(--text-tertiary); display:flex; align-items:center; gap:6px; }
.hint-sub { font-size:11.5px; color:var(--text-tertiary); }

/* Sequence blocks */
.sb { border-radius:var(--radius-md); border:1px solid var(--border); background:var(--surface); overflow:visible; position:relative; transition:border-color .15s,box-shadow .15s,background .2s; }
.sb:hover { border-color:var(--border-hover); box-shadow:0 1px 4px rgba(0,0,0,.08); }
.sbh { display:flex; align-items:center; gap:7px; padding:8px 10px; cursor:pointer; user-select:none; }
.drag-handle { color:var(--text-tertiary); font-size:13px; cursor:grab; flex-shrink:0; }
.sbn { font-size:10.5px; color:var(--text-tertiary); min-width:16px; font-weight:500; }
.cbar { width:4px; border-radius:2px; flex-shrink:0; align-self:stretch; min-height:20px; }
.sbt { font-size:12.5px; font-weight:500; flex:1; color:var(--text-primary); }
.sbm { font-size:11px; color:var(--text-tertiary); min-width:40px; text-align:right; white-space:nowrap; }
.sba { display:flex; gap:2px; margin-left:2px; }
.ib { background:none; border:none; cursor:pointer; color:var(--text-tertiary); padding:3px 4px; border-radius:4px; font-size:13px; line-height:1; transition:color .15s,background .15s; }
.ib:hover { color:var(--text-primary); background:var(--surface-2); }
.sbb { border-top:1px solid var(--border); padding:10px 11px; display:none; flex-direction:column; gap:8px; background:var(--surface-2); border-radius:0 0 var(--radius-md) var(--radius-md); transition:background .2s; }
.sbb.open { display:flex; }
.fl { display:flex; flex-direction:column; gap:4px; }
.fl label { font-size:10.5px; font-weight:600; color:var(--text-secondary); }
.fi { font-size:12.5px; padding:6px 9px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface); color:var(--text-primary); font-family:inherit; resize:vertical; transition:border-color .15s,background .2s,color .2s; }
.fi:focus { outline:none; border-color:var(--green); box-shadow:0 0 0 3px rgba(0,112,60,.1); }
.trow { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

/* Resize handle */
.rh { height:10px; background:transparent; cursor:ns-resize; display:flex; align-items:center; justify-content:center; border-top:1px solid var(--border); border-radius:0 0 var(--radius-md) var(--radius-md); transition:background .15s; }
.rh:hover { background:rgba(0,112,60,.08); }
.rh-dots { display:flex; align-items:center; gap:3px; }
.rh-dots span { width:3px; height:3px; border-radius:50%; background:var(--border-hover); }

/* Bottom bar */
.bbar { display:flex; gap:8px; padding-top:12px; border-top:1px solid var(--border); margin-top:4px; flex-wrap:wrap; }
.btn { padding:7px 14px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface); font-size:12.5px; font-weight:500; cursor:pointer; color:var(--text-primary); font-family:inherit; display:flex; align-items:center; gap:5px; transition:background .15s,border-color .15s; text-decoration:none; }
.btn:hover { background:var(--surface-2); border-color:var(--border-hover); }
.btn-gemini { background:#1a73e8; border-color:#1a73e8; color:#fff; }
.btn-gemini:hover { background:#1558c0; border-color:#1558c0; color:#fff; }
.btnp { background:var(--green); border-color:var(--green); color:#fff; }
.btnp:hover { background:var(--green-dark); border-color:var(--green-dark); }
.rshint { font-size:10px; color:var(--text-tertiary); font-weight:400; text-transform:none; letter-spacing:0; }

/* Duration selector */
.dur-row { display:flex; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.dur-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--text-tertiary); white-space:nowrap; }
.dur-btns { display:flex; gap:5px; }
.dur-btn { padding:5px 12px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface); font-size:12px; font-weight:500; cursor:pointer; color:var(--text-secondary); font-family:inherit; transition:all .15s; }
.dur-btn:hover { border-color:var(--border-hover); background:var(--surface-2); }
.dur-btn.active { background:var(--green); border-color:var(--green); color:#fff; }
.dur-custom { display:flex; align-items:center; gap:5px; }
.dur-custom input { width:52px; font-size:12px; padding:5px 7px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface); color:var(--text-primary); font-family:inherit; text-align:center; }
.dur-custom input:focus { outline:none; border-color:var(--green); }
.dur-custom span { font-size:12px; color:var(--text-tertiary); }
</style>
</head>

<script>
let MAX=50,MIN_M=1;
let mode='drag',seq=[],dragB=null,dragI=null,resizing=null,rsY=0,rsM=0,rsNM=0;

// Theme
function initTheme(){
  const saved=localStorage.getItem('rv-theme')||'light';
  setTheme(saved,false);
}
function setTheme(t,save=true){
  document.documentElement.setAttribute('data-theme',t);
  const icon=document.getElementById('theme-icon');
  if(icon)icon.className=t==='dark'?'ti ti-sun':'ti ti-moon';
  const label=document.getElementById('theme-label');
  if(label)label.textContent=t==='dark'?'Light':'Dark';
  if(save)localStorage.setItem('rv-theme',t);
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')||'light';
  setTheme(cur==='dark'?'light':'dark');
}

const SYSTEM_PROMPT=`You are an instructional coach at Ravenscroft School, a PreK-12 independent school in Raleigh, NC. You are reviewing a middle school teacher's lesson plan and providing warm, specific, coaching-style feedback — like a trusted colleague, not an evaluator.

RAVENSCROFT BLOCK DEFINITIONS:
- Connecting Activity: a community-building moment — teacher connects with students personally, or students connect with one another. Relational, NOT content-based. Not about connecting ideas or priming schema.
- CFU (Formative Check for Understanding): quick check — exit ticket, poll, thumbs up/down — to assess student understanding in the moment.
- Last Class Connection: brief revisit of what was covered last session.
- Next Class Connection: short preview of what's coming next.
- Debrief: student-led reflection on the learning and process — distinct from a teacher summary.
- Hook / Activator: opening move to spark curiosity, energy, or engagement before content begins.
- Direct Instruction: explicit, teacher-led teaching of a concept or skill.
- Modeling / Demo: worked examples or think-aloud to make invisible cognitive processes visible.
- Guided Practice: scaffolded practice with active teacher support.
- Independent Practice: students working alone with reduced teacher support.
- Collaborative Work: structured partner or group activity.
- Discussion: student-centered talk — Socratic seminar, think-pair-share, fishbowl, etc.
- Learning Objective: sharing the goal and success criteria with students.
- Brain Break: a brief, intentional pause from cognitive work — movement, breathing, or a non-academic reset — to restore attention and readiness to learn.

RAVENSCROFT INSTRUCTIONAL PRIORITIES:

1. SHIFT THE LIFT: The school's primary instructional priority is moving cognitive work from teacher to student. Flag teacher-heavy lessons. Celebrate student-centered structures. Ask: who is doing the thinking?

2. RAVENSCROFT CETs — cite by number when relevant:
- CET 1a: Designs lessons supporting learning outcomes; communicates standards of performance explicitly.
- CET 1c: High academic standards; opportunities for critical thinking, collaboration, communication, creativity, problem-solving.
- CET 1d: Communicates lesson objectives effectively and clearly.
- CET 1e: Assesses individual needs; shifts approach for diverse learners.
- CET 1f: Positive classroom environment; adjusts to meet group needs.
- CET 1g: Students are accountable, engaged, independent; captures student interest; develops student voice.
- CET 1h: Recognizes and elicits learning from classroom experiences; adaptable and open to outcome.
- CET 1i: Debriefing strategies focused on intended outcomes; manages time to accomplish designed outcomes.
- CET 1j: Models and promotes self-awareness, self-regulation, ethical behavior, organization, accountability.

3. NEUROTEACH (Whitman & Nesbit): Ground feedback in brain-based learning science. Key principles: retrieval practice and spaced repetition; low-stakes formative assessment; stress and emotional state affect learning; limits of working memory and importance of chunking; metacognition and student reflection; danger of passive learning; value of active processing; growth mindset neurological basis. Brain Breaks are explicitly supported by Neuroteach.

4. WEBB'S DEPTH OF KNOWLEDGE: Comment on cognitive demand. Is work primarily DOK 1 (recall) or DOK 2 (skill/concept)? Is there space for DOK 3 (strategic thinking) or DOK 4 (extended thinking)? Strong lessons push toward DOK 2-3. Flag lessons staying at DOK 1 throughout.

5. SCHLECHTY'S ENGAGEMENT LEVELS:
- Authentic Engagement: work is genuinely meaningful and personally valuable to students.
- Ritual Compliance: students comply to avoid consequences, not because it matters.
- Passive Compliance: going through the motions without real investment.
- Retreatism: disengagement without disruption.
- Rebellion: refusal or active resistance.
Strong lesson design should aim for Authentic Engagement.

FLAGS TO ALWAYS CHECK:
- Missing Connecting Activity: gently flag; community connection is a Ravenscroft value.
- Direct Instruction over 12-15 min: flag; middle school working memory research recommends chunking and active processing breaks.
- Student-led time under 50% of total: flag as shift the lift opportunity.
- Missing Debrief: flag missing student reflection moment (CET 1i).
- Missing CFU: flag missing formative assessment moment.

TONE: Warm, specific, coaching-style. Lead with what is working. Be direct but encouraging about what to reconsider. Use I notice, I wonder, One thing to consider, This is a strength language. End with 1-2 concrete actionable next steps. Pick the 2-3 most important observations — do not overwhelm.

---

LESSON PLAN TO REVIEW:`;

const GROUPS=[
  {sec:'Opening',blocks:[
    {id:'hook',label:'Hook / activator',sl:null,color:'#F5B800',desc:'Spark curiosity or energy before content begins'},
    {id:'lastclass',label:'Last class connection',sl:null,color:'#E09020',desc:'Briefly revisit what was covered last class'},
    {id:'connecting',label:'Connecting activity',sl:null,color:'#B06010',desc:'Community-building: teacher-to-student or student-to-student connection'},
    {id:'objective',label:'Learning objective',sl:null,color:'#00703C',desc:'Share the goal and success criteria'},
  ]},
  {sec:'Instruction',blocks:[
    {id:'direct',label:'Direct instruction',sl:null,color:'#2B7FD4',desc:'Explicit, teacher-led teaching of new concept or skill'},
    {id:'model',label:'Modeling / demo',sl:null,color:'#6B5FCC',desc:'Worked examples or think-aloud'},
  ]},
  {sec:'Practice',blocks:[
    {id:'guided',label:'Guided practice',sl:null,color:'#1A9068',desc:'Scaffolded practice with teacher support'},
    {id:'collab',label:'Collaborative work',sl:null,color:'#C04A20',desc:'Partner or group activity'},
    {id:'indep',label:'Independent practice',sl:null,color:'#4E8010',desc:'Students work individually'},
    {id:'discuss',label:'Discussion',sl:null,color:'#B84070',desc:'Socratic, think-pair-share, fishbowl, etc.'},
  ]},
  {sec:'Assessment & Closing',blocks:[
    {id:'cfu',label:'Formative check for understanding',sl:'CFU',color:'#505050',desc:'Exit ticket, poll, or quick comprehension check'},
    {id:'debrief',label:'Debrief',sl:null,color:'#1558A0',desc:'Student-led reflection on learning and process'},
    {id:'nextclass',label:'Next class connection',sl:null,color:'#4A3AAA',desc:"Preview what's coming to build anticipation"},
  ]},
  {sec:'Other',blocks:[
    {id:'brainbreak',label:'Brain break',sl:null,color:'#0E8060',desc:'Brief movement, breathing, or non-academic reset to restore attention'},
  ]},
];

function total(){return seq.reduce((s,b)=>s+(+b.mins||0),0);}
function equalMins(){if(!seq.length)return;const base=Math.floor(MAX/seq.length),rem=MAX-(base*seq.length);seq.forEach((b,i)=>{b.mins=base+(i<rem?1:0);});}

function setMode(m){
  mode=m;
  document.getElementById('btn-drag').className='modebt'+(m==='drag'?' active':'');
  document.getElementById('btn-click').className='modebt'+(m==='click'?' active':'');
  document.getElementById('pal-label').textContent=m==='drag'?'Block palette — drag to add':'Block palette — click to add in order';
  const hm=document.getElementById('hint-main');
  if(hm)hm.innerHTML=m==='drag'?'<i class="ti ti-arrow-down"></i> Drag blocks here to build your lesson':'<i class="ti ti-cursor-text"></i> Click blocks in the order you want them';
  renderPal();
}

function renderTL(){
  const bar=document.getElementById('tl-bar'),t=total();
  if(!seq.length||t===0){bar.innerHTML='<div style="flex:1;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-tertiary)">Build your lesson to see the timeline</div>';return;}
  bar.innerHTML=seq.map(b=>{const lbl=b.sl||b.label;return`<div class="tl-seg" style="flex:${b.mins};background:${b.color}" title="${lbl}: ${b.mins} min"><span class="tl-seg-label">${b.mins>=4?lbl:''}<br style="${b.mins<4?'display:none':''}">${b.mins>=3?b.mins+'m':''}</span></div>`;}).join('');
}

function updateStatus(){
  const t=total(),rem=MAX-t;
  document.getElementById('btext').textContent=t+' / '+MAX+' min';
  const badge=document.getElementById('tbadge'),al=document.getElementById('alert'),rn=document.getElementById('rn');
  renderTL();
  if(t>MAX){badge.className='tbadge over';al.className='alert on';document.getElementById('atext').textContent='Over by '+(t-MAX)+' min — drag block edges to adjust.';rn.className='rn none';rn.textContent=(t-MAX)+' min over';}
  else if(t>=MAX-4&&t>0){badge.className='tbadge warn';al.className='alert';rn.className='rn tight';rn.textContent=rem+' min remaining';}
  else{badge.className='tbadge';al.className='alert';rn.className='rn';rn.textContent=t===0?'50 min remaining':rem+' min remaining';}
}

function renderPal(){
  const p=document.getElementById('pal');p.innerHTML='';
  GROUPS.forEach(g=>{
    const s=document.createElement('div');s.className='psec';s.textContent=g.sec;p.appendChild(s);
    g.blocks.forEach(b=>{
      const el=document.createElement('div');el.className='chip '+(mode==='drag'?'dm':'cm');
      if(mode==='drag')el.draggable=true;
      el.innerHTML=`<span class="dot" style="background:${b.color}"></span><span style="flex:1;line-height:1.35">${b.label}</span>`;
      if(mode==='drag')el.addEventListener('dragstart',e=>{dragB=b;dragI=null;e.dataTransfer.effectAllowed='copy';});
      else el.addEventListener('click',()=>{seq.push({...b,notes:'',group:'whole class',open:false});equalMins();renderSeq();});
      p.appendChild(el);
    });
  });
}

function renderSeq(){
  const sl=document.getElementById('seqlist'),hint=document.getElementById('hint');
  sl.innerHTML='';
  if(!seq.length){hint.style.display='flex';updateStatus();return;}
  hint.style.display='none';
  document.getElementById('rshint').textContent=seq.length>1?'— drag \u2837 to resize':'';
  seq.forEach((item,i)=>{
    const lbl=item.sl||item.label;
    const showHandle=seq.length>1;
    const isLast=i===seq.length-1;
    const handleIdx=isLast?i-1:i;
    const el=document.createElement('div');el.className='sb';el.draggable=true;
    el.innerHTML=`<div class="sbh" onclick="tog(${i})"><span class="drag-handle"><i class="ti ti-grip-vertical"></i></span><span class="sbn">${i+1}</span><div class="cbar" style="background:${item.color}"></div><span class="sbt">${lbl}</span><span class="sbm" id="sbm${i}">${item.mins} min</span><div class="sba"><button class="ib" onclick="event.stopPropagation();mv(${i},-1)" title="Move up"><i class="ti ti-chevron-up"></i></button><button class="ib" onclick="event.stopPropagation();mv(${i},1)" title="Move down"><i class="ti ti-chevron-down"></i></button><button class="ib" onclick="event.stopPropagation();rm(${i})" title="Remove"><i class="ti ti-x"></i></button></div></div><div class="sbb${item.open?' open':''}" id="bd${i}"><div class="fl"><label>Notes / instructions</label><textarea class="fi" rows="2" placeholder="${item.desc}" oninput="uf(${i},'notes',this.value)">${item.notes||''}</textarea></div><div class="trow"><div class="fl"><label>Time (min)</label><input class="fi" type="number" min="1" max="50" value="${item.mins}" oninput="uf(${i},'mins',+this.value||1)"></div><div class="fl"><label>Grouping</label><select class="fi" onchange="uf(${i},'group',this.value)"><option ${(item.group||'whole class')==='whole class'?'selected':''}>whole class</option><option ${item.group==='small group'?'selected':''}>small group</option><option ${item.group==='pairs'?'selected':''}>pairs</option><option ${item.group==='individual'?'selected':''}>individual</option></select></div></div></div>${showHandle?`<div class="rh" data-idx="${handleIdx}"><div class="rh-dots"><span></span><span></span><span></span></div></div>`:''}`;
    el.addEventListener('dragstart',e=>{if(e.target.closest('.rh'))e.preventDefault();else{dragI=i;dragB=null;e.dataTransfer.effectAllowed='move';}});
    el.addEventListener('dragover',e=>{e.preventDefault();el.style.outline='2px solid #00703C';el.style.borderRadius='8px';});
    el.addEventListener('dragleave',()=>{el.style.outline='';});
    el.addEventListener('drop',e=>{e.stopPropagation();el.style.outline='';dropOn(i);});
    sl.appendChild(el);
  });
  document.querySelectorAll('.rh').forEach(h=>{h.addEventListener('mousedown',startR);h.addEventListener('touchstart',startR,{passive:false});});
  updateStatus();
}

function startR(e){
  e.preventDefault();e.stopPropagation();
  const idx=+e.currentTarget.dataset.idx;
  resizing=idx;rsY=e.touches?e.touches[0].clientY:e.clientY;
  rsM=seq[idx].mins;rsNM=seq[idx+1].mins;
  document.addEventListener('mousemove',doR);document.addEventListener('mouseup',stopR);
  document.addEventListener('touchmove',doR,{passive:false});document.addEventListener('touchend',stopR);
}
function doR(e){
  if(resizing===null)return;e.preventDefault();
  const y=e.touches?e.touches[0].clientY:e.clientY,delta=Math.round((y-rsY)/8);
  let nM=rsM+delta,xM=rsNM-delta;
  if(nM<MIN_M){xM-=(MIN_M-nM);nM=MIN_M;}
  if(xM<MIN_M){nM-=(MIN_M-xM);xM=MIN_M;}
  const other=seq.reduce((s,b,i)=>i===resizing||i===resizing+1?s:s+(+b.mins||0),0);
  if(nM+xM>MAX-other)xM=Math.max(MIN_M,(MAX-other)-nM);
  seq[resizing].mins=nM;seq[resizing+1].mins=xM;
  const m1=document.getElementById('sbm'+resizing),m2=document.getElementById('sbm'+(resizing+1));
  if(m1)m1.textContent=nM+' min';if(m2)m2.textContent=xM+' min';
  updateStatus();
}
function stopR(){resizing=null;document.removeEventListener('mousemove',doR);document.removeEventListener('mouseup',stopR);document.removeEventListener('touchmove',doR);document.removeEventListener('touchend',stopR);renderSeq();}

function tog(i){seq[i].open=!seq[i].open;renderSeq();}
function uf(i,k,v){seq[i][k]=v;if(k==='mins'){updateStatus();const el=document.getElementById('sbm'+i);if(el)el.textContent=v+' min';}if(k!=='notes')renderSeq();}
function rm(i){seq.splice(i,1);equalMins();renderSeq();}
function mv(i,d){const j=i+d;if(j<0||j>=seq.length)return;[seq[i],seq[j]]=[seq[j],seq[i]];renderSeq();}
function dropOn(ti){
  if(dragB){seq.splice(ti,0,{...dragB,notes:'',group:'whole class',open:false});equalMins();}
  else if(dragI!==null&&dragI!==ti){const m=seq.splice(dragI,1)[0];seq.splice(dragI<ti?ti-1:ti,0,m);}
  dragB=null;dragI=null;renderSeq();
}

const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('hover');});
dz.addEventListener('dragleave',e=>{if(!dz.contains(e.relatedTarget))dz.classList.remove('hover');});
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('hover');if(dragB){seq.push({...dragB,notes:'',group:'whole class',open:false});equalMins();}dragB=null;dragI=null;renderSeq();});

function clearAll(){if(!seq.length||confirm('Clear the lesson plan?')){seq=[];renderSeq();}}
function getMeta(){return{subject:document.getElementById('m-subject').value||'',grade:document.getElementById('m-grade').value||'',date:document.getElementById('m-date').value||''};}
function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');const mo=['January','February','March','April','May','June','July','August','September','October','November','December'];return mo[+m-1]+' '+parseInt(day)+', '+y;}

function buildPrompt(){
  if(!seq.length)return null;
  const meta=getMeta(),t=total();
  const teacherMins=seq.filter(b=>['direct','model','objective'].includes(b.id)).reduce((s,b)=>s+(+b.mins||0),0);
  const studentMins=seq.filter(b=>['guided','collab','indep','discuss','cfu','debrief'].includes(b.id)).reduce((s,b)=>s+(+b.mins||0),0);
  const flags=[];
  if(!seq.some(b=>b.id==='connecting'))flags.push('No Connecting Activity present.');
  if(!seq.some(b=>b.id==='debrief'))flags.push('No Debrief present.');
  if(!seq.some(b=>b.id==='cfu'))flags.push('No CFU present.');
  const di=seq.find(b=>b.id==='direct');if(di&&di.mins>14)flags.push('Direct Instruction is '+di.mins+' min — exceeds recommended 12-14 min ceiling.');
  if(studentMins<teacherMins)flags.push('Teacher-led time ('+teacherMins+' min) exceeds student-led time ('+studentMins+' min) — shift the lift opportunity.');
  const plan=seq.map((b,i)=>`${i+1}. ${b.sl||b.label} (${b.mins} min${b.group&&b.group!=='whole class'?' · '+b.group:''})${b.notes?' — '+b.notes:''}`).join('\n');
  const ctx=[meta.subject&&'Subject: '+meta.subject,meta.grade&&'Grade: '+meta.grade,meta.date&&'Date: '+fmtDate(meta.date)].filter(Boolean).join(' | ');
  const lessonText=`${ctx?ctx+'\n\n':''}Total time: ${t} / 50 min\n\n${plan}${flags.length?'\n\nAuto-detected flags:\n'+flags.join('\n'):''}`;
  return SYSTEM_PROMPT+'\n\n'+lessonText+'\n\nPlease provide coaching feedback.';
}

function buildGeminiUrl(anchor){
  if(!seq.length){alert('Build a lesson first!');return false;}
  const prompt=buildPrompt();
  const encoded=encodeURIComponent(prompt);
  // Pass to relay page via hash so it never hits a server
  const relayUrl='gemini-relay.html#'+encoded;
  anchor.href=relayUrl;
  return true;
}

function doExport(){
  if(!seq.length){alert('Add some blocks first!');return;}
  const meta=getMeta(),t=total();
  const tlHTML=seq.map(b=>{const lbl=b.sl||b.label,pct=Math.round((b.mins/MAX)*100);return`<td style="width:${pct}%;background:${b.color};padding:0;vertical-align:middle;text-align:center"><div style="padding:4px 2px"><div style="font-family:Arial,Helvetica,sans-serif;font-size:9px;font-weight:700;color:#fff;line-height:1.3;text-shadow:0 1px 2px rgba(0,0,0,.5)">${b.mins>=4?lbl:''}</div>${b.mins>=3?`<div style="font-family:Arial,Helvetica,sans-serif;font-size:9px;color:#fff;opacity:.9">${b.mins}m</div>`:''}</div></td>`;}).join('');
  const cardsHTML=seq.map((b,i)=>{const lbl=b.sl||b.label;const r=parseInt(b.color.slice(1,3),16),g=parseInt(b.color.slice(3,5),16),bl=parseInt(b.color.slice(5,7),16);const bg=`rgb(${Math.round(r+(255-r)*.92)},${Math.round(g+(255-g)*.92)},${Math.round(bl+(255-bl)*.92)})`;return`<tr><td style="padding:0 0 8px"><table width="100%" cellpadding="0" cellspacing="0" style="background:${bg};border-radius:8px;border-left:5px solid ${b.color}"><tr><td style="width:36px;padding:10px 6px 10px 12px;vertical-align:top"><div style="width:26px;height:26px;border-radius:50%;background:${b.color};font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:700;color:#fff;text-align:center;line-height:26px">${i+1}</div></td><td style="padding:10px 14px 10px 4px;vertical-align:top"><div style="font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:3px">${lbl}</div><div style="font-family:Arial,Helvetica,sans-serif;font-size:11px;color:#555">${b.mins} min${b.group&&b.group!=='whole class'?' · '+b.group:''}</div>${b.notes?`<div style="font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#333;margin-top:7px;padding-top:7px;border-top:1px solid rgba(0,0,0,.08)">${b.notes}</div>`:''}</td></tr></table></td></tr>`;}).join('');
  const html=`<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Lesson Plan${meta.subject?' — '+meta.subject:''}</title></head><body style="margin:0;padding:0;background:#f5f5f5;font-family:Arial,Helvetica,sans-serif"><table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;min-height:100vh"><tr><td align="center" style="padding:32px 16px"><table width="680" cellpadding="0" cellspacing="0" style="max-width:680px;width:100%;background:#fff;border-radius:12px;overflow:hidden"><tr><td style="padding:24px 28px 20px;border-bottom:3px solid #00703C"><table width="100%" cellpadding="0" cellspacing="0"><tr><td><table cellpadding="0" cellspacing="0"><tr><td><div style="width:40px;height:40px;background:#00703C;border-radius:8px;text-align:center;line-height:40px;font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:700;color:#FFC702;display:inline-block">R</div></td><td style="padding-left:12px"><div style="font-family:Arial,Helvetica,sans-serif;font-size:17px;font-weight:700;color:#00703C">Ravenscroft School</div><div style="font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#888">Middle School</div></td></tr></table></td><td align="right">${meta.subject?`<div style="font-family:Arial,Helvetica,sans-serif;font-size:16px;font-weight:700;color:#1a1a1a">${meta.subject}</div>`:''} ${meta.grade?`<div style="font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#666">${meta.grade}</div>`:''} ${meta.date?`<div style="font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#666">${fmtDate(meta.date)}</div>`:''}</td></tr></table></td></tr><tr><td style="padding:20px 28px 8px"><div style="font-family:Arial,Helvetica,sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#999;margin-bottom:10px">Today's class at a glance</div><table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;border-radius:8px;overflow:hidden;height:52px"><tr style="height:52px">${tlHTML}</tr></table><table width="100%" cellpadding="0" cellspacing="0" style="margin-top:5px"><tr><td style="font-family:Arial,Helvetica,sans-serif;font-size:10px;color:#aaa">0 min</td><td align="right" style="font-family:Arial,Helvetica,sans-serif;font-size:10px;color:#aaa">${t} min total</td></tr></table></td></tr><tr><td style="padding:16px 28px 24px"><div style="font-family:Arial,Helvetica,sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#999;margin-bottom:12px">Lesson sequence</div><table width="100%" cellpadding="0" cellspacing="0">${cardsHTML}</table></td></tr><tr><td style="padding:14px 28px 20px;border-top:1px solid #eee"><table width="100%" cellpadding="0" cellspacing="0"><tr><td style="font-family:Arial,Helvetica,sans-serif;font-size:10px;color:#bbb">Ravenscroft School · Middle School</td><td align="right" style="font-family:Arial,Helvetica,sans-serif;font-size:10px;color:#bbb">Total: ${t} / 50 min</td></tr></table></td></tr></table><div style="text-align:center;margin-top:20px" class="no-print"><button onclick="window.print()" style="padding:10px 28px;background:#00703C;color:#fff;border:none;border-radius:8px;font-family:Arial,Helvetica,sans-serif;font-size:13px;font-weight:700;cursor:pointer">Print this plan</button><p style="font-family:Arial,Helvetica,sans-serif;font-size:11px;color:#aaa;margin-top:8px">Tip: choose Save as PDF in print dialog to share digitally</p></div></td></tr></table><style>@media print{body{background:#fff!important}.no-print{display:none!important}}</style></body></html>`;
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(meta.subject?meta.subject.replace(/\s+/g,'-').toLowerCase()+'-':'')+'lesson-plan.html';a.click();
}

function setMax(val,skipCustomClear=false){
  MAX=val;
  // Update button states
  document.querySelectorAll('.dur-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent.trim()===val+' min');
  });
  if(!skipCustomClear){
    const ci=document.getElementById('dur-custom-input');
    if(ci)ci.value='';
  }
  // Update timeline labels
  const mid=document.getElementById('tl-mid');
  const max=document.getElementById('tl-max');
  if(mid)mid.textContent=Math.round(val/2)+' min';
  if(max)max.textContent=val+' min';
  // Rescale existing blocks proportionally
  if(seq.length){
    const oldTotal=seq.reduce((s,b)=>s+(+b.mins||0),0);
    if(oldTotal>0){
      let distributed=0;
      seq.forEach((b,i)=>{
        if(i<seq.length-1){
          const share=Math.max(MIN_M,Math.round((b.mins/oldTotal)*MAX));
          b.mins=share;distributed+=share;
        } else {
          b.mins=Math.max(MIN_M,MAX-distributed);
        }
      });
    }
  }
  renderSeq();
}

function setMaxCustom(val){
  const n=parseInt(val);
  if(!n||n<5||n>120)return;
  // Deactivate preset buttons
  document.querySelectorAll('.dur-btn').forEach(b=>b.classList.remove('active'));
  setMax(n,true);
}

initTheme();
renderPal();renderSeq();updateStatus();
document.getElementById('m-date').valueAsDate=new Date();
